<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Checkmark in background -->
    <path d="M16 34 L26 44 L48 20" stroke="#3a9a4e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
    <!-- Flower petals -->
    <ellipse cx="32" cy="16" rx="7" ry="11" fill="#3a9a4e" opacity="0.3"/>
    <ellipse cx="32" cy="48" rx="7" ry="11" fill="#3a9a4e" opacity="0.3"/>
    <ellipse cx="16" cy="32" rx="11" ry="7" fill="#3a9a4e" opacity="0.3"/>
    <ellipse cx="48" cy="32" rx="11" ry="7" fill="#3a9a4e" opacity="0.3"/>
    <ellipse cx="20.7" cy="20.7" rx="7" ry="11" transform="rotate(45 20.7 20.7)" fill="#3a9a4e" opacity="0.22"/>
    <ellipse cx="43.3" cy="43.3" rx="7" ry="11" transform="rotate(45 43.3 43.3)" fill="#3a9a4e" opacity="0.22"/>
    <ellipse cx="43.3" cy="20.7" rx="7" ry="11" transform="rotate(-45 43.3 20.7)" fill="#3a9a4e" opacity="0.22"/>
    <ellipse cx="20.7" cy="43.3" rx="7" ry="11" transform="rotate(-45 20.7 43.3)" fill="#3a9a4e" opacity="0.22"/>
    <!-- Timer circle -->
    <circle cx="32" cy="32" r="14" fill="#3a9a4e"/>
    <circle cx="32" cy="32" r="12" fill="none" stroke="#2d7a3e" stroke-width="1.5" opacity="0.3"/>
    <!-- Timer tick marks -->
    <line x1="32" y1="20" x2="32" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="32" y1="41" x2="32" y2="44" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="32" x2="23" y2="32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="41" y1="32" x2="44" y2="32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Timer hands -->
    <line x1="32" y1="32" x2="32" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="38" y2="29" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
